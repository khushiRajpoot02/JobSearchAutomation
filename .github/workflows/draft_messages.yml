name: Draft Referral Messages

on:
  workflow_dispatch:   # Manual trigger only — run this after a connection request is accepted

jobs:
  draft-messages:
    name: Draft Gemini Messages for Accepted Connections
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Draft referral messages
        env:
          SERPAPI_KEY:             ${{ secrets.SERPAPI_KEY }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          CANDIDATE_NAME:          ${{ secrets.CANDIDATE_NAME }}
          CANDIDATE_LINKEDIN:      ${{ secrets.CANDIDATE_LINKEDIN }}
          YEARS_OF_EXPERIENCE:     ${{ secrets.YEARS_OF_EXPERIENCE }}
        run: |
          cd src
          python main.py --mode draft_messages
